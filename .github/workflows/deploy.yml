name: deploy
on:
  push:
    branches:
      - main
      - release
jobs:
  deploy2qa:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: SSH and run QA update script through Cloudflare Tunnel
        uses: and-fm/cloudflared-ssh-action@v3
        with:
          host: ${{ secrets.QA_VPS_HOST }}
          port: ${{ secrets.QA_VPS_PORT }}
          username: ${{ secrets.QA_VPS_USER }}
          private_key_filename: qa_key
          private_key_value: ${{ secrets.QA_VPS_SSH_KEY }}
          service_token_id: ${{ secrets.QA_CLOUDFLARE_ACCESS_CLIENT_ID }}
          service_token_secret: ${{ secrets.QA_CLOUDFLARE_ACCESS_CLIENT_SECRET }}
          commands: |
            /home/tloi/update_tloj.sh

  deploy2prod:
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Run PROD update script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            /home/tloi/update_tloj.sh
