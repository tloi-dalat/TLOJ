{% extends "base.html" %}

{% block body %}
<div id="tools-list">
  <div class="tools-grid">

    <a href="{{ url('graph_editor') }}" class="tool-card">
      <div class="tool-icon"><i class="fa fa-share-alt"></i></div>
      <div class="tool-info">
        <div class="tool-name">Graph Editor</div>
        <div class="tool-desc">Visualize and edit graphs interactively</div>
      </div>
    </a>

    <a href="{{ url('resolver_tool') }}" class="tool-card">
      <div class="tool-icon"><i class="fa fa-play-circle"></i></div>
      <div class="tool-info">
        <div class="tool-name">Resolver</div>
        <div class="tool-desc">Replay contest standings</div>
      </div>
    </a>

  </div>
</div>

<style>
  #tools-list {
    padding: 0.5rem 0;
  }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .tool-card {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .tool-card:hover {
    border-color: #888;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    text-decoration: none;
  }

  .tool-icon {
    font-size: 1.6rem;
    color: #888;
    flex-shrink: 0;
    width: 2rem;
    text-align: center;
    padding-top: 0.1rem;
  }

  .tool-name {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }

  .tool-desc {
    font-size: 0.875rem;
    color: #666;
    line-height: 1.4;
  }

  @media (prefers-color-scheme: dark) {
    .tool-card {
      border-color: #444;
    }

    .tool-card:hover {
      border-color: #888;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .tool-desc {
      color: #aaa;
    }
  }
</style>
{% endblock %}
