<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('Resolver Viewer') }}</title>
    <link rel="icon" type="image/png" href="{{ static('icons/favicon.ico') }}">
    <link rel="stylesheet" href="{{ static('resolver.css') }}">
    <script>
        window.resolverConfig = {
            loadFromSession: true,
            labels: {
                pendingSubmissions: "{{ _('pending submissions') }}",
                pressEnter: "{{ _('Press ENTER to start') }}"
            }
        };
    </script>
    <script src="{{ static('resolver.js') }}"></script>
</head>
<body class="dark-theme">
    <div id="splash-screen" class="screen">
        <div class="center">
            <h1 class="title" id="contest-name"></h1>
            <div class="gap"></div>
            <div class="subtitle" id="splash-pending"></div>
            <div class="gap"></div>
            <div class="subtitle small" id="splash-instruction"></div>
        </div>
    </div>

    <div id="output-screen" class="screen hidden">
        <div id="header" class="header">
            <div class="header-rank">RANK</div>
            <div class="header-logo"></div>
            <div class="header-name">NAME</div>
            <div class="header-score">SCORE</div>
            <div class="header-time">TIME</div>
        </div>
        <div id="standings" class="standings"></div>
    </div>
</body>
</html>
